<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../css/chitiet1.css">
</head>

<body>

<div class="container product-page">

    <div class="row g-4">

        <div class="col-md-6">

            <div class="main-image">
                <img id="mainImg" src="../../assets/images/riccks.jpg" loading = "lazy">
            </div>

            <div class="thumb-list mt-3">
                <img src="../../assets/images/riccks.jpg" onclick="changeImg(this)">
                <img src="../../assets/images/riccks2.webp" onclick="changeImg(this)">
                <img src="../../assets/images/riccks3.webp" onclick="changeImg(this)">
            </div>

        </div>

        <div class="col-md-6">

            <h2 class="product-title">Riccks RS8 V2</h2>

            <div class="price">1.050.000đ</div>

            <div class="short-desc">
                Bàn phím cơ layout TKL, gasket mount, hỗ trợ QMK/VIA.
            </div>

            <div class="variant-box">
                <label>Chọn switch:</label>
                <select>
                    <option>Bsun Taichi</option>
                    <option>HMX Cheese Pink</option>
                    <option>Kailh Snow Ice</option>
                </select>
            </div>

            <div class="action-box">
                <input type="number" value="1" min="1">
                <button class="btn-cart">Thêm vào giỏ</button>
            </div>

            <button class="btn-buy">Mua ngay</button>

            <div class="info-box">
                <p><b>Layout:</b> TKL</p>
                <p><b>Mount:</b> Gasket</p>
                <p><b>Hot-swap:</b> Có</p>
                <p><b>Firmware:</b> QMK / VIA</p>
            </div>

        </div>

    </div>

</div>

<script src = "../../js/lib.js"></script>
</body>
</html>
